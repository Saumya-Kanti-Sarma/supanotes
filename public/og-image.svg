<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#863bff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#47bfff;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <ellipse cx="200" cy="200" rx="300" ry="200" fill="#863bff" opacity="0.15" filter="url(#blur)"/>
  <ellipse cx="1000" cy="450" rx="250" ry="180" fill="#47bfff" opacity="0.1" filter="url(#blur)"/>
  <ellipse cx="600" cy="600" rx="400" ry="150" fill="#7e14ff" opacity="0.12" filter="url(#blur)"/>

  <!-- Mock editor window -->
  <rect x="680" y="80" width="460" height="470" rx="16" fill="#111111" opacity="0.9" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Window dots -->
  <circle cx="708" cy="108" r="7" fill="#ff5f57"/>
  <circle cx="730" cy="108" r="7" fill="#febc2e"/>
  <circle cx="752" cy="108" r="7" fill="#28c840"/>
  <!-- Tab bar -->
  <rect x="680" y="124" width="460" height="36" fill="#1a1a1a" rx="0"/>
  <rect x="688" y="130" width="100" height="24" rx="6" fill="#2a2a2a"/>
  <text x="738" y="146" font-family="monospace" font-size="11" fill="#aaa" text-anchor="middle">notes.md</text>
  <rect x="796" y="130" width="110" height="24" rx="6" fill="#1f1f1f"/>
  <text x="851" y="146" font-family="monospace" font-size="11" fill="#555" text-anchor="middle">ideas.md</text>
  <!-- Editor lines -->
  <rect x="700" y="176" width="180" height="10" rx="4" fill="#863bff" opacity="0.8"/>
  <rect x="700" y="198" width="380" height="8" rx="4" fill="#444"/>
  <rect x="700" y="216" width="320" height="8" rx="4" fill="#444"/>
  <rect x="700" y="234" width="360" height="8" rx="4" fill="#444"/>
  <rect x="700" y="260" width="140" height="8" rx="4" fill="#863bff" opacity="0.5"/>
  <rect x="700" y="278" width="300" height="8" rx="4" fill="#333"/>
  <rect x="700" y="296" width="260" height="8" rx="4" fill="#333"/>
  <rect x="700" y="322" width="160" height="8" rx="4" fill="#863bff" opacity="0.5"/>
  <rect x="700" y="340" width="340" height="8" rx="4" fill="#333"/>
  <rect x="700" y="358" width="200" height="8" rx="4" fill="#333"/>
  <!-- Sidebar -->
  <rect x="680" y="160" width="1" height="380" fill="#2a2a2a"/>

  <!-- Logo -->
  <g transform="translate(100, 200) scale(3.5)">
    <path fill="#863bff" d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
  </g>

  <!-- Title -->
  <text x="100" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-2">supa</text>
  <text x="100" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#863bff" letter-spacing="-2" dx="175">notes</text>

  <!-- Tagline -->
  <text x="100" y="480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" fill="#888">A fast, beautiful notes app that lives in your browser.</text>

  <!-- Bottom border accent -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#glow)"/>
  <rect x="100" y="620" width="200" height="4" rx="2" fill="#863bff" opacity="0.8"/>
</svg>
